name: access-service docker

on:
  push:
    branches: ["main"]
    paths:
      - "services/access-service/**"
      - ".github/workflows/access-service-docker.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "services/access-service/**"
      - ".github/workflows/access-service-docker.yml"

jobs:
  build-and-optional-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # needed for GHCR; harmless otherwise

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login only when pushing to main (not on PRs)
      - name: Log in to registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPOSITORY }}/access-service
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ./services/access-service
          file: ./services/access-service/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max